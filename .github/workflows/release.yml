name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ── Windows: WPF 풀 에디션 → 설치 프로그램 + 포터블 zip ──────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish (self-contained single file)
        run: >
          dotnet publish CaptureIt/CaptureIt.csproj -c Release -r win-x64
          --self-contained true -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true -o publish/win

      - name: Portable zip
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v")
          Compress-Archive -Path publish/win/CaptureIt.exe -DestinationPath "CaptureIt-Portable-$ver-win-x64.zip"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v")
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DAppVersion=$ver installer\CaptureIt.iss
          # 아티팩트 경로가 평평해지도록 루트로 이동
          Move-Item "dist\CaptureIt-Setup-$ver-win-x64.exe" .

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            CaptureIt-Setup-*-win-x64.exe
            CaptureIt-Portable-*-win-x64.zip

  # ── Linux: 크로스 에디션 tar.gz ──────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: >
          dotnet publish CaptureIt.Cross/CaptureIt.Cross.csproj -c Release -r linux-x64
          --self-contained true -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true -o publish/linux

      - name: Package tar.gz
        run: |
          ver="${GITHUB_REF_NAME#v}"
          mkdir -p stage/CaptureIt
          cp publish/linux/CaptureIt stage/CaptureIt/
          cp packaging/linux/captureit.desktop packaging/linux/install.sh packaging/linux/captureit.png stage/CaptureIt/
          chmod +x stage/CaptureIt/CaptureIt stage/CaptureIt/install.sh
          tar -czf "CaptureIt-$ver-linux-x64.tar.gz" -C stage CaptureIt

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: CaptureIt-*-linux-x64.tar.gz

  # ── macOS: 크로스 에디션 .app 번들 (Intel + Apple Silicon) ───────────────
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - rid: osx-x64
            suffix: intel
          - rid: osx-arm64
            suffix: apple-silicon
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: >
          dotnet publish CaptureIt.Cross/CaptureIt.Cross.csproj -c Release -r ${{ matrix.rid }}
          --self-contained true -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true -o publish/mac

      - name: Make .app bundle
        run: |
          ver="${GITHUB_REF_NAME#v}"
          mkdir -p "CaptureIt.app/Contents/MacOS" "CaptureIt.app/Contents/Resources"
          cp publish/mac/CaptureIt "CaptureIt.app/Contents/MacOS/CaptureIt"
          chmod +x "CaptureIt.app/Contents/MacOS/CaptureIt"
          cp packaging/macos/AppIcon.icns "CaptureIt.app/Contents/Resources/AppIcon.icns"
          sed "s/APP_VERSION/$ver/g" packaging/macos/Info.plist > "CaptureIt.app/Contents/Info.plist"
          ditto -c -k --keepParent CaptureIt.app "CaptureIt-$ver-macos-${{ matrix.suffix }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.suffix }}
          path: CaptureIt-*-macos-${{ matrix.suffix }}.zip

  # ── 릴리스 생성 ──────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Version
        id: ver
        run: echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            CaptureIt-Setup-*-win-x64.exe
            CaptureIt-Portable-*-win-x64.zip
            CaptureIt-*-linux-x64.tar.gz
            CaptureIt-*-macos-intel.zip
            CaptureIt-*-macos-apple-silicon.zip
          generate_release_notes: true
          body: |
            ## Downloads · 다운로드

            | OS | File | Notes |
            |---|---|---|
            | **Windows 10/11** | `CaptureIt-Setup-${{ steps.ver.outputs.v }}-win-x64.exe` | Installer, recommended · 설치 프로그램 (권장) |
            | Windows 10/11 | `CaptureIt-Portable-${{ steps.ver.outputs.v }}-win-x64.zip` | Portable, no install · 무설치 포터블 |
            | **Linux x64** | `CaptureIt-${{ steps.ver.outputs.v }}-linux-x64.tar.gz` | Extract, then run `./install.sh` (cross-platform edition) |
            | **macOS (Apple Silicon)** | `CaptureIt-${{ steps.ver.outputs.v }}-macos-apple-silicon.zip` | Unzip → right-click → Open (cross-platform edition) |
            | macOS (Intel) | `CaptureIt-${{ steps.ver.outputs.v }}-macos-intel.zip` | Unzip → right-click → Open (cross-platform edition) |

            **macOS**: unsigned app — first launch requires **right-click → Open**, and grant *Screen Recording* permission when prompted.
            **Linux**: needs one of `gnome-screenshot` / `spectacle` / `grim`+`slurp` / `scrot` / ImageMagick; clipboard needs `wl-clipboard` or `xclip`.

  # ── README 다운로드 표의 버전·링크를 새 릴리스로 갱신 ────────────────────
  update-readme:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Point download links at this release
        run: |
          ver="${GITHUB_REF_NAME#v}"
          sed -i -E \
            -e "s/CaptureIt-Setup-[0-9.]+-win-x64\.exe/CaptureIt-Setup-$ver-win-x64.exe/g" \
            -e "s/CaptureIt-Portable-[0-9.]+-win-x64\.zip/CaptureIt-Portable-$ver-win-x64.zip/g" \
            -e "s/CaptureIt-[0-9.]+-linux-x64\.tar\.gz/CaptureIt-$ver-linux-x64.tar.gz/g" \
            -e "s/CaptureIt-[0-9.]+-macos-apple-silicon\.zip/CaptureIt-$ver-macos-apple-silicon.zip/g" \
            -e "s/CaptureIt-[0-9.]+-macos-intel\.zip/CaptureIt-$ver-macos-intel.zip/g" \
            -e "s|releases/download/v[0-9.]+/|releases/download/v$ver/|g" \
            README.md README.ko.md
          if git diff --quiet; then
            echo "README already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md README.ko.md
          git commit -m "docs: point download links at v$ver"
          git push
